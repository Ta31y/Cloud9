    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

    <script>
      let releasedClouds = 0;

      AFRAME.registerComponent("proximity-release", {
        schema: {
          message: { type: "string" },
          distance: { type: "number", default: 8 },
        },

        init: function () {
          this.released = false;
        },

        tick: function () {
          if (this.released) return;

          const player = document.querySelector("#rig");
          if (!player) return;

          const playerPos = new THREE.Vector3();
          const cloudPos = new THREE.Vector3();

          player.object3D.getWorldPosition(playerPos);
          this.el.object3D.getWorldPosition(cloudPos);

          const distance = playerPos.distanceTo(cloudPos);

          if (distance < this.data.distance) {
            this.released = true;
            releasedClouds++;

            const instructionText = document.querySelector("#experienceText");

            instructionText.setAttribute(
              "troika-text",
              "value: " +
                this.data.message +
                "; font: fonts/Atop.ttf; color: #FFFFFF; fontSize: 0.9; maxWidth: 12; align: center;",
            );

            this.el.setAttribute("visible", false);

            const sphere = document.createElement("a-sphere");
            sphere.setAttribute("position", this.el.getAttribute("position"));
            sphere.setAttribute("radius", "2");
            sphere.setAttribute("color", "#FFFFFF");
            sphere.setAttribute("opacity", "0.85");
            sphere.setAttribute(
              "animation",
              "property: scale; from: 0 0 0; to: 1 1 1; dur: 800",
            );

            document.querySelector("a-scene").appendChild(sphere);

            if (releasedClouds === 4) {
              setTimeout(() => {
                document
                  .querySelector("#finalMessage")
                  .setAttribute("visible", true);

                instructionText.setAttribute(
                  "troika-text",
                  "value: You have let go. Welcome to Cloud9.; font: fonts/Atop.ttf; color: #FFFFFF; fontSize: 0.9; maxWidth: 12; align: center;",
                );
              }, 900);
            }
          }
        },
      });
    </script>
