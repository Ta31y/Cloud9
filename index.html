<html>
  <head>
    <title>Cloud9 VR Experience</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

    <script>
      let releasedClouds = 0;

      AFRAME.registerComponent("release-cloud", {
        schema: {
          message: { type: "string" },
        },

        init: function () {
          this.el.addEventListener("click", () => {
            if (this.el.getAttribute("visible") === false) return;

            releasedClouds++;

            const instructionText = document.querySelector("#experienceText");
            instructionText.setAttribute("value", this.data.message);

            this.el.setAttribute(
              "animation__fade",
              "property: scale; to: 0 0 0; dur: 800",
            );
            setTimeout(() => {
              this.el.setAttribute("visible", false);
            }, 800);

            if (releasedClouds === 4) {
              setTimeout(() => {
                document
                  .querySelector("#finalMessage")
                  .setAttribute("visible", true);
                instructionText.setAttribute(
                  "value",
                  "You have let go. Welcome to Cloud9.",
                );
              }, 900);
            }
          });
        },
      });

      document.addEventListener("click", function () {
        const soundEntity = document.querySelector("[sound]");
        if (soundEntity && soundEntity.components.sound) {
          soundEntity.components.sound.playSound();
        }
      });
    </script>
  </head>

  <body>
    <a-scene fog="type: linear; color: #B8E7FF; near: 15; far: 250">
      <a-assets>
        <a-asset-item id="cloud" src="models/cloud.glb"></a-asset-item>
        <a-asset-item
          id="dubaiClouds"
          src="models/dubai_clouds.glb"
        ></a-asset-item>
        <a-asset-item id="cloudTest" src="models/cloud_test.glb"></a-asset-item>
        <img id="logo" src="images/logo.png" />
        <audio
          id="windAudio"
          src="audio/wind.mp4"
          preload="auto"
          loop="true"
        ></audio>
      </a-assets>

      <a-sky color="#B8E7FF"></a-sky>

      <a-entity light="type: ambient; intensity: 1.6"></a-entity>
      <a-entity
        light="type: directional; intensity: 0.8"
        position="5 10 5"
      ></a-entity>

      <a-entity
        id="rig"
        movement-controls="fly: true; speed: 0.2"
        position="0 2 8"
      >
        <a-camera>
          <a-cursor
            color="white"
            fuse="true"
            fuse-timeout="1000"
            raycaster="objects: .clickable"
          >
          </a-cursor>
        </a-camera>

        <a-entity
          meta-touch-controls="hand: left"
          laser-controls="hand: left"
          raycaster="objects: .clickable"
        >
        </a-entity>

        <a-entity
          meta-touch-controls="hand: right"
          laser-controls="hand: right"
          raycaster="objects: .clickable"
        >
        </a-entity>
      </a-entity>

      <a-entity
        sound="src: #windAudio; autoplay: false; loop: true; volume: 1"
      ></a-entity>

      <a-circle
        position="0 -0.3 -60"
        rotation="-90 0 0"
        radius="150"
        color="#37b7fa"
      >
      </a-circle>

      <!-- CLOUD9 LOGO -->
      <a-plane
        src="#logo"
        position="0 5.4 -13"
        width="9"
        height="4.5"
        material="transparent: true; alphaTest: 0.5; side: double"
        animation="property: position; to: 0 5.8 -13; dur: 5000; loop: true; dir: alternate"
      >

      <!-- EXPERIENCE TEXT -->
      <a-entity
        troika-text="value: Touch the clouds and let go of what weighs you down.; 
               font: fonts/Atop.ttf; 
               color: #FFFFFF; 
               fontSize: 0.7;

               align: center;"

      >

      <!-- FINAL MESSAGE -->

        color="#FFFFFF"
        width="7"
        visible="false"
